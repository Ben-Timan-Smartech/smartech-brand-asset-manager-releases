name: Release

# Builds the private app source for Windows + macOS, signs the update artifacts,
# and publishes a GitHub Release here (public) including the updater latest.json.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Source branch/tag/sha to build"
        default: main
  repository_dispatch:
    types: [release]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: Ben-Timan-Smartech/smartech-brand-asset-manager
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          V=$(node -p "require('./src-tauri/tauri.conf.json').version")
          NOTES=$(awk -v h="## v$V" '$0==h{f=1;next} f&&/^## /{exit} f{print}' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release v$V"
          {
            echo "body<<__NOTES_EOF__"
            echo "$NOTES"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch HandBrakeCLI sidecar
        shell: bash
        run: |
          set -e
          VER=1.11.2
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            curl -sL -o hb.zip "https://github.com/HandBrake/HandBrake/releases/download/$VER/HandBrakeCLI-$VER-win-x86_64.zip"
            unzip -o hb.zip -d hb >/dev/null
            cp "$(find hb -name 'HandBrakeCLI.exe' | head -1)" "src-tauri/binaries/handbrakecli-x86_64-pc-windows-msvc.exe"
          else
            curl -sL -o hb.dmg "https://github.com/HandBrake/HandBrake/releases/download/$VER/HandBrakeCLI-$VER.dmg"
            MNT=$(hdiutil attach -nobrowse -readonly hb.dmg | tail -1 | awk '{print $NF}')
            cp "$MNT/HandBrakeCLI" "src-tauri/binaries/handbrakecli-aarch64-apple-darwin"
            hdiutil detach "$MNT" >/dev/null
            chmod +x "src-tauri/binaries/handbrakecli-aarch64-apple-darwin"
          fi
          ls -l src-tauri/binaries

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "tm:rw Brand Asset Manager v__VERSION__"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false

  publish-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the finished draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG=$(gh release list --repo "$REPO" --json tagName,isDraft --jq '[.[]|select(.isDraft)][0].tagName')
          echo "Publishing $TAG"
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
